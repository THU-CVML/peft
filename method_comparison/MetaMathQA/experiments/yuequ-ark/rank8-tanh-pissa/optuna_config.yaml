# --- 1. 研究配置 (Study Configuration) ---
# 您可以根据需要修改研究名称和试验总次数
study_name: "peft-method_comparison-MetaMathQA-gsm8k-yuequ-ark-tanh"

# study_name: "peft-method_comparison-MetaMathQA-gsm8k-yuequ-ark-rank8-tanh-pissa"
n_trials: 1000
direction: "maximize"

# --- 2. 目标指标 (Target Metric) ---
# 确保这些键名与 run.py 打印的JSON日志中的键名完全一致
intermediate_metric: "valid accuracy"
final_metric: "test accuracy"

# --- 3. 超参数搜索空间 (Hyperparameter Search Space) ---
files:
  # 仅针对 train_params.json 文件中的参数进行搜索
  training_params.json:
    optimizer_kwargs.lr:
      type: "float"
      args:
        name: "learning_rate"
        low: 1.0e-5 # 学习率搜索下限
        high: 1.0e-3 # 学习率搜索上限
        log: True    # 建议对学习率使用对数尺度搜索
    optimizer_kwargs.weight_decay:
      type: "float"
      args:
        name: "weight_decay"
        low: 0.01
        high: 0.2

    # alpha 为 64
  yuequ_config.yaml:
    latent_dim:
      type: "categorical"
      args:
        name: "latent_dim"
        choices: [4, 8, 16, 32, 64]
    lora_alpha:
      type: "categorical"
      args:
        name: "lora_alpha"
        choices: [16, 32, 64]
    pissa: 
      type: "categorical"
      args:
        name: "pissa"
        choices: [true, false]
       

        # low: 8
        # high: 128
        # log: True
    

